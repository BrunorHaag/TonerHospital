
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Toner - Firestore Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen p-8">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold text-gray-800 mb-8 text-center">Controle de Toner <span class="text-emerald-500 text-lg font-semibold">(🔥 Firestore Sync)</span></h1>

    <!-- Status -->
    <div id="status" class="bg-emerald-100 border border-emerald-400 text-emerald-800 px-4 py-3 rounded mb-6 hidden">
      Conectado! Sync real-time ativo
    </div>
    <div id="status-error" class="bg-red-100 border border-red-400 text-red-800 px-4 py-3 rounded mb-6 hidden">
      Erro conexão
    </div>

    <!-- Form Add -->
    <div class="bg-white p-6 rounded-lg shadow-md mb-8">
      <h2 class="text-2xl font-semibold mb-4">Adicionar Setor</h2>
      <form id="add-form" class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <input type="text" id="nome" placeholder="Nome do Setor" required class="p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500">
        <input type="text" id="ramal" placeholder="Ramal" required class="p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500">
        <input type="text" id="cilindro" placeholder="Cilindro" required class="p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500">
        <input type="number" id="toner" placeholder="Toner" min="0" class="p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500">
        <button type="submit" class="md:col-span-4 bg-emerald-500 text-white py-3 px-6 rounded-lg font-semibold hover:bg-emerald-600">+ Adicionar</button>
      </form>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-lg shadow-md overflow-hidden">
      <div class="p-6 border-b flex justify-between">
        <h2 class="text-2xl font-semibold">Setores</h2>
        <span id="count" class="text-sm text-gray-600">0 setores</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="bg-gray-50">
              <th class="p-4 text-left">Nome</th>
              <th class="p-4 text-left">Ramal</th>
              <th class="p-4 text-left">Cilindro</th>
              <th class="p-4 text-left">Toner</th>
              <th class="p-4 text-left">Ações</th>
            </tr>
          </thead>
          <tbody id="table-body">
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modal Edit -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
      <div class="bg-white rounded-xl p-8 w-full max-w-md max-h-[90vh] overflow-auto shadow-2xl">
        <h3 class="text-2xl font-bold mb-6">Editar Setor</h3>
        <form id="edit-form" class="space-y-4">
          <input type="hidden" id="edit-id">
          <input id="edit-nome" placeholder="Nome" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500" required>
          <input id="edit-ramal" placeholder="Ramal" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500" required>
          <input id="edit-cilindro" placeholder="Cilindro" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500" required>
          <input id="edit-toner" type="number" placeholder="Toner" min="0" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500">
          <div class="flex gap-3">
            <button type="submit" class="flex-1 bg-emerald-500 text-white py-3 rounded-lg font-semibold hover:bg-emerald-600">Salvar</button>
            <button type="button" id="close-modal" class="flex-1 bg-gray-300 py-3 rounded-lg font-semibold hover:bg-gray-400">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Firestore SDK v10 -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDfgTfVe0nL0xkVk9CkfNu5_BHiaMW8l5s",
      authDomain: "toners-ahsj.firebaseapp.com",
      projectId: "toners-ahsj",
      storageBucket: "toners-ahsj.firebasestorage.app",
      messagingSenderId: "849029002625",
      appId: "1:849029002625:web:208fc8160fb2955198e480"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const sectorsRef = collection(db, 'sectors');
    const q = query(sectorsRef, orderBy('createdAt'));

    const status = document.getElementById('status');
    const errorStatus = document.getElementById('status-error');
    const countEl = document.getElementById('count');
    const tbody = document.getElementById('table-body');
    const modal = document.getElementById('modal');

    // Listen real-time
    onSnapshot(q, (snap) => {
      const sectors = [];
      snap.forEach((docSnap) => {
        sectors.push({ id: docSnap.id, ...docSnap.data() });
      });
      window.sectors = sectors;
      renderTable(sectors);
      status.classList.remove('hidden');
      countEl.textContent = `${sectors.length} setores`;
    }, (err) => {
      console.error(err);
      errorStatus.textContent = `Erro: ${err.message}`;
      errorStatus.classList.remove('hidden');
    });

    function renderTable(sectors) {
      tbody.innerHTML = sectors.map(sector => `
        <tr class="hover:bg-gray-50 border-b">
          <td class="p-4 font-medium">${escape(sector.nome)}</td>
          <td class="p-4">${escape(sector.ramal)}</td>
          <td class="p-4">${escape(sector.cilindro)}</td>
          <td class="p-4 font-semibold">${sector.toner}</td>
          <td class="p-4">
            <button class="edit bg-blue-500 text-white px-4 py-1 rounded text-sm mr-2 hover:bg-blue-600" data-id="${sector.id}">Editar</button>
            <button class="delete bg-red-500 text-white px-4 py-1 rounded text-sm hover:bg-red-600" data-id="${sector.id}">Excluir</button>
          </td>
        </tr>
      `).join('');
    }

    // Add
    document.getElementById('add-form').onsubmit = async (e) => {
      e.preventDefault();
      const data = {
        nome: document.getElementById('nome').value,
        ramal: document.getElementById('ramal').value,
        cilindro: document.getElementById('cilindro').value,
        toner: parseInt(document.getElementById('toner').value) || 0,
        createdAt: new Date()
      };
      try {
        await addDoc(sectorsRef, data);
        document.getElementById('add-form').reset();
      } catch (err) {
        alert('Erro: ' + err.message);
      }
    };

    // Events
    document.addEventListener('click', async (e) => {
      const target = e.target;
      if (target.classList.contains('edit')) {
        const id = target.dataset.id;
        const sector = window.sectors.find(s => s.id === id);
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-nome').value = sector.nome;
        document.getElementById('edit-ramal').value = sector.ramal;
        document.getElementById('edit-cilindro').value = sector.cilindro;
        document.getElementById('edit-toner').value = sector.toner;
        modal.classList.remove('hidden');
      } else if (target.classList.contains('delete')) {
        if (confirm('Excluir?')) {
          const id = target.dataset.id;
          await deleteDoc(doc(db, 'sectors', id));
        }
      }
    });

    // Edit save
    document.getElementById('edit-form').onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const data = {
        nome: document.getElementById('edit-nome').value,
        ramal: document.getElementById('edit-ramal').value,
        cilindro: document.getElementById('edit-cilindro').value,
        toner: parseInt(document.getElementById('edit-toner').value) || 0
      };
      try {
        await updateDoc(doc(db, 'sectors', id), data);
        modal.classList.add('hidden');
      } catch (err) {
        alert('Erro: ' + err.message);
      }
    };

    document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');

    modal.onclick = (e) => e.target === e.currentTarget && modal.classList.add('hidden');

    function escape(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
