<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Toner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image" href="./logo/Hospital-Sao-Jose.jpg">
</head>
<body class="bg-gray-100 min-h-screen p-8">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold text-gray-800 mb-8 text-center">Controle de Toner</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-500 text-center">
        <p class="text-gray-500 uppercase text-xs font-bold tracking-wider">Setores Cadastrados</p>
        <p id="count-setores" class="text-3xl font-black text-gray-800">0</p>
      </div>
      <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-green-500 text-center">
        <p class="text-gray-500 uppercase text-xs font-bold tracking-wider">Total de Toners</p>
        <p id="total-toner" class="text-3xl font-black text-green-600">0</p>
      </div>
      <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-purple-500 text-center">
        <p class="text-gray-500 uppercase text-xs font-bold tracking-wider">Total de Cilindros</p>
        <p id="total-cilindro" class="text-3xl font-black text-purple-600">0</p>
      </div>
    </div>

    <div id="dashboard">
      <div class="bg-white p-6 rounded-lg shadow-md mb-8">
        <h2 class="text-2xl font-semibold mb-4">Adicionar Setor</h2>
        <form id="add-form" class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <input type="text" id="nome" placeholder="Nome do Setor" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
          <input type="text" id="ramal" placeholder="Ramal" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
          <input type="number" id="cilindro" placeholder="Qtd Cilindro" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
          <input type="number" id="toner" placeholder="Qtd Toner" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
          <button type="submit" class="md:col-span-4 bg-green-500 text-white py-3 px-6 rounded-lg font-semibold hover:bg-green-600 transition-colors">Adicionar Setor</button>
        </form>
      </div>

      <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <div class="overflow-x-auto">
          <table id="sectors-table" class="w-full">
            <thead>
              <tr class="bg-gray-50">
                <th class="p-4 text-left">Nome</th>
                <th class="p-4 text-left">Ramal</th>
                <th class="p-4 text-left">Cilindro</th>
                <th class="p-4 text-left">Toner</th>
                <th class="p-4 text-center">Ações</th>
              </tr>
            </thead>
            <tbody id="sectors-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
      <div class="bg-white rounded-lg p-8 max-w-md w-full shadow-2xl">
        <h2 class="text-2xl font-semibold mb-6">Editar Setor</h2>
        <form id="edit-form" class="space-y-4">
          <input type="hidden" id="edit-id">
          <div>
            <label class="block text-sm font-medium text-gray-700">Nome</label>
            <input type="text" id="edit-nome" class="w-full p-3 border rounded-lg" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Ramal</label>
            <input type="text" id="edit-ramal" class="w-full p-3 border rounded-lg" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Quantidade Cilindro</label>
            <input type="number" id="edit-cilindro" class="w-full p-3 border rounded-lg" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Quantidade Toner</label>
            <input type="number" id="edit-toner" class="w-full p-3 border rounded-lg" required>
          </div>
          <div class="flex gap-3 pt-4">
            <button type="submit" class="flex-1 bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 font-bold">Salvar</button>
            <button type="button" id="cancel-edit" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg font-bold">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
